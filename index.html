<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Merged Materials Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f8;
        --surface: rgba(255, 255, 255, 0.95);
        --surface-strong: #ffffff;
        --line: #d7e0eb;
        --ink: #12263a;
        --muted: #62758a;
        --accent: #1f6feb;
        --ok: #1f8a5b;
        --warn: #c47a00;
        --shadow: 0 18px 48px rgba(18, 38, 58, 0.12);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        overflow-y: scroll;
        overflow-x: hidden;
        color: var(--ink);
        font-family: "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(31, 111, 235, 0.12), transparent 30%),
          radial-gradient(circle at bottom right, rgba(31, 138, 91, 0.08), transparent 32%),
          linear-gradient(180deg, #f8fbfe 0%, var(--bg) 100%);
      }

      h1, h2, h3, p, ul { margin: 0; }
      button { font: inherit; }

      .shell {
        max-width: 1480px;
        margin: 0 auto;
        padding: 18px 16px 32px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 18px 20px;
        margin-bottom: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
        flex-wrap: wrap;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .title {
        margin-top: 6px;
        font-size: 30px;
        line-height: 1.1;
        font-weight: 800;
      }

      .lede {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
        max-width: 82ch;
      }

      .top-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .stat {
        min-width: 130px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
      .stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; }
      .stat-sub { margin-top: 4px; color: var(--muted); font-size: 12px; }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
        min-height: 320px;
        padding: 16px;
        cursor: pointer;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .kicker {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .card-title {
        margin-top: 6px;
        font-size: 22px;
        line-height: 1.15;
        font-weight: 800;
      }

      .card-sub {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .pill.ok { background: #e8f4e6; color: var(--ok); border-color: rgba(31, 138, 91, 0.18); }
      .pill.warn { background: #fff3d8; color: var(--warn); border-color: rgba(196, 122, 0, 0.18); }
      .pill.info { background: #e8f1ff; color: var(--accent); border-color: rgba(31, 111, 235, 0.18); }

      .panel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 12px;
      }

      .field {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid #dce5ef;
        background: #fff;
      }

      .field-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .field-value {
        font-size: 17px;
        font-weight: 800;
        line-height: 1.15;
        word-break: break-word;
      }

      .field-value.big { font-size: 20px; }

      .row-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 98px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid #dce5ef;
        border-radius: 14px;
        background: #fff;
      }

      .row-label { font-weight: 800; }
      .row-desc { color: var(--muted); font-size: 13px; line-height: 1.35; }
      .row-value { font-size: 13px; font-weight: 800; color: var(--accent); }

      .stack { display: grid; gap: 10px; }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        background: rgba(12, 22, 35, 0.58);
        backdrop-filter: blur(8px);
      }

      .modal.open { display: grid; }

      .modal-shell {
        width: min(1400px, calc(100vw - 36px));
        height: min(920px, calc(100vh - 36px));
        margin: auto;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.35);
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(0,0,0,0.28);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .modal-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #ffffff, #f8fbff);
      }

      .modal-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .back-btn {
        width: 32px;
        min-width: 32px;
        height: 32px;
        padding: 0;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 800;
        line-height: 1.15;
      }

      .modal-sub {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .iframe-wrap {
        min-height: 0;
        background: #e9eef6;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }

      @media (max-width: 1200px) {
        .grid,
        .panel-grid { grid-template-columns: 1fr; }

        .topbar { justify-content: stretch; }
        .top-stats { justify-content: flex-start; }
      }

      @media (max-width: 780px) {
        .shell { padding: 12px; }
        .topbar { padding: 16px; }
        .title { font-size: 24px; }
        .card-title { font-size: 20px; }
        .row { grid-template-columns: 1fr; }
        .modal-shell { width: calc(100vw - 18px); height: calc(100vh - 18px); }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <div class="eyebrow">MERGED MATERIALS</div>
          <h1 class="title" id="heroTitle">머지된 실제 산출물 대시보드</h1>
          <p class="lede" id="heroSubtitle">머지된 PR과 실제 생성 파일을 한눈에 보고, 카드 클릭 시 전체화면 작업 화면으로 이동합니다.</p>
        </div>
        <div class="top-stats">
          <div class="stat">
            <div class="stat-label">머지 완료</div>
            <div class="stat-value" id="mergedCount">3</div>
            <div class="stat-sub">실제 산출물 반영</div>
          </div>
          <div class="stat">
            <div class="stat-label">전체 보기</div>
            <div class="stat-value">2x2</div>
            <div class="stat-sub">가로 2, 세로 2</div>
          </div>
          <div class="stat">
            <div class="stat-label">상태</div>
            <div class="stat-value">LIVE</div>
            <div class="stat-sub">GitHub Pages 배포</div>
          </div>
        </div>
      </section>

      <section class="grid" id="cards"></section>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
      <section class="modal-shell" role="dialog" aria-modal="true">
        <div class="modal-top">
          <div class="modal-left">
            <button type="button" class="pill back-btn" id="modalClose" aria-label="대시보드로 돌아가기">←</button>
            <div>
              <div class="modal-title" id="modalTitle">미리보기</div>
              <div class="modal-sub" id="modalSub">실제 작업 화면</div>
            </div>
          </div>
          <div class="pill" id="modalKind">PREVIEW</div>
        </div>
        <div class="iframe-wrap">
          <iframe id="previewFrame" title="preview"></iframe>
        </div>
      </section>
    </div>

    <script>
      const els = {
        heroTitle: document.getElementById("heroTitle"),
        heroSubtitle: document.getElementById("heroSubtitle"),
        mergedCount: document.getElementById("mergedCount"),
        cards: document.getElementById("cards"),
        modal: document.getElementById("modal"),
        modalTitle: document.getElementById("modalTitle"),
        modalSub: document.getElementById("modalSub"),
        modalKind: document.getElementById("modalKind"),
        previewFrame: document.getElementById("previewFrame"),
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function loadJson(path) {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`Failed to load ${path}: ${response.status}`);
        return response.json();
      }

      function renderCard(item) {
        const fields = [
          ["구분", item.kind],
          ["상태", item.status],
          ["대표 파일", item.primaryFile],
          ["머지 일자", new Date(item.mergedAt).toLocaleDateString("ko-KR", {
            year: "numeric",
            month: "long",
            day: "numeric",
          })],
        ]
          .map(([label, value]) => `
            <div class="field">
              <div class="field-label">${escapeHtml(label)}</div>
              <div class="field-value ${label === "상태" || label === "대표 파일" ? "big" : ""}">${escapeHtml(value)}</div>
            </div>`)
          .join("");

        const summary = item.summary
          .map((line) => `<li>${escapeHtml(line)}</li>`)
          .join("");

        const actions = (item.actions || [])
          .map((action) => `<a class="action" href="${escapeHtml(action.href)}" target="_blank" rel="noreferrer" data-action-link="1">${escapeHtml(action.label)}</a>`)
          .join("");

        return `
          <article class="card" data-title="${escapeHtml(item.artifactTitle)}" data-sub="${escapeHtml(item.primaryFile)}" data-kind="${escapeHtml(item.badge || item.kind)}" data-preview="${escapeHtml(item.previewPath)}" role="button" tabindex="0">
            <div class="card-head">
              <div>
                <div class="kicker">PR #${escapeHtml(item.number)} · ${escapeHtml(item.author)} · ${escapeHtml(item.prTitle)}</div>
                <h2 class="card-title">${escapeHtml(item.artifactTitle)}</h2>
                <p class="card-sub">${escapeHtml(item.primaryFile)}</p>
              </div>
              <span class="pill">${escapeHtml(item.badge || item.kind)}</span>
            </div>
            <div class="panel-grid">${fields}</div>
            <div class="stack">
              <div class="card-sub"><strong>핵심 요약</strong></div>
              <ul style="padding-left: 18px; color: var(--muted); line-height: 1.5;">${summary}</ul>
              <div class="tag-row">
                <span class="pill ok">${escapeHtml(item.status)}</span>
                <span class="pill warn">${new Date(item.mergedAt).toLocaleDateString("ko-KR", {
                  year: "numeric",
                  month: "numeric",
                  day: "numeric",
                })}</span>
              </div>
              <div class="card-actions">${actions}</div>
            </div>
          </article>`;
      }

      function openPreview(card) {
        els.modalTitle.textContent = card.title;
        els.modalSub.textContent = card.sub;
        els.modalKind.textContent = card.kind;
        els.previewFrame.src = card.preview;
        els.modal.classList.add("open");
        els.modal.setAttribute("aria-hidden", "false");
      }

      function closePreview() {
        els.modal.classList.remove("open");
        els.modal.setAttribute("aria-hidden", "true");
        els.previewFrame.src = "about:blank";
      }

      async function init() {
        const data = await loadJson("data/issues.json");
        const materials = data.materials || [];

        els.heroTitle.textContent = data.hero?.title || els.heroTitle.textContent;
        els.heroSubtitle.textContent = data.hero?.subtitle || els.heroSubtitle.textContent;
        els.mergedCount.textContent = String(data.hero?.mergedCount ?? materials.length);
        els.cards.innerHTML = materials.map(renderCard).join("");

        document.querySelectorAll(".card").forEach((cardEl) => {
          const open = () =>
            openPreview({
              title: cardEl.dataset.title,
              sub: cardEl.dataset.sub,
              kind: cardEl.dataset.kind,
              preview: cardEl.dataset.preview,
            });

          cardEl.addEventListener("click", open);
          cardEl.querySelectorAll("[data-action-link]").forEach((link) => {
            link.addEventListener("click", (event) => event.stopPropagation());
          });
          cardEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              open();
            }
          });
        });

        document.getElementById("modalClose").addEventListener("click", closePreview);
        els.modal.addEventListener("click", (event) => {
          if (event.target === els.modal) closePreview();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closePreview();
        });
      }

      init().catch((error) => {
        els.cards.innerHTML = `<div class="field"><div class="field-label">불러오기 실패</div><div class="field-value big">${escapeHtml(error.message)}</div></div>`;
      });
    </script>
  </body>
</html>
