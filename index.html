<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>머지된 실제 산출물 대시보드</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f8;
        --surface: rgba(255, 255, 255, 0.94);
        --surface-strong: #ffffff;
        --border: #d8e1ee;
        --border-soft: #e8eef5;
        --text: #0f253a;
        --muted: #5f7085;
        --accent: #1f6feb;
        --success: #1f8a5b;
        --warning: #b87900;
        --shadow: 0 18px 44px rgba(16, 37, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        font-family: "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(31, 111, 235, 0.11), transparent 28%),
          radial-gradient(circle at bottom right, rgba(31, 138, 91, 0.08), transparent 30%),
          linear-gradient(180deg, #f8fbfe 0%, var(--bg) 100%);
      }

      button,
      a {
        font: inherit;
      }

      a {
        color: var(--accent);
      }

      .app {
        width: 100vw;
        height: 100vh;
        padding: 12px;
        overflow: hidden;
      }

      .shell {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
        overflow-y: scroll;
        overflow-x: hidden;
        padding-right: 6px;
        scrollbar-gutter: stable;
      }

      .hero {
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .hero-kicker {
        margin: 0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero-title {
        margin: 6px 0 0;
        font-size: clamp(20px, 1.8vw, 30px);
        line-height: 1.18;
        font-weight: 900;
      }

      .hero-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .hero-chip {
        padding: 9px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .grid {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
        gap: 12px;
        align-content: start;
      }

      .card {
        min-width: 0;
        min-height: 0;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 10px;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 50px rgba(16, 37, 58, 0.16);
      }

      .card:focus-visible,
      .back-btn:focus-visible,
      .action-btn:focus-visible,
      .link-btn:focus-visible {
        outline: 3px solid rgba(31, 111, 235, 0.26);
        outline-offset: 2px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .card-kicker {
        margin: 0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .card-title {
        margin: 4px 0 0;
        font-size: clamp(15px, 1.15vw, 20px);
        line-height: 1.2;
        font-weight: 900;
      }

      .card-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .pill {
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }

      .content {
        min-height: 0;
        display: grid;
        gap: 10px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .summary {
        padding: 12px;
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        background: var(--surface-strong);
        overflow: hidden;
      }

      .summary-label {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 6px;
      }

      .summary-value {
        font-size: clamp(15px, 1.6vw, 24px);
        font-weight: 900;
        line-height: 1.05;
      }

      .list-card {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: var(--surface-strong);
        overflow: hidden;
      }

      .list-card h3 {
        margin: 0;
        font-size: 12px;
      }

      .list-card ul {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .file-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 10px 11px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: var(--surface-strong);
        min-height: 48px;
        overflow: hidden;
      }

      .file-id {
        font-weight: 900;
        font-size: 12px;
      }

      .file-title {
        line-height: 1.25;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-state {
        font-size: 11px;
        font-weight: 800;
        color: var(--success);
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      .status.done {
        color: var(--success);
        border-color: rgba(31, 138, 91, 0.2);
        background: rgba(31, 138, 91, 0.06);
      }

      .status.review {
        color: var(--warning);
        border-color: rgba(184, 121, 0, 0.2);
        background: rgba(184, 121, 0, 0.06);
      }

      .overview {
        cursor: pointer;
      }

      .overview-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        background: rgba(238, 243, 248, 0.94);
        backdrop-filter: blur(10px);
        overflow: hidden;
      }

      .modal.open {
        display: block;
      }

      .modal-shell {
        width: 100vw;
        height: 100vh;
        padding: 12px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
        overflow: hidden;
      }

      .back-btn {
        width: 36px;
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
      }

      .modal-content {
        min-height: 0;
        overflow: hidden;
      }

      .modal-panel {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
        overflow: hidden;
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .modal-kicker {
        margin: 0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      .modal-title {
        margin: 4px 0 0;
        font-size: clamp(18px, 2vw, 28px);
        line-height: 1.18;
        font-weight: 900;
      }

      .modal-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .link-btn {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 12px;
        overflow: hidden;
      }

      .workspace-main,
      .workspace-side {
        min-height: 0;
        display: grid;
        gap: 12px;
        overflow: hidden;
      }

      .workspace-side {
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      .section {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--border-soft);
        background: var(--surface-strong);
        min-height: 0;
        display: grid;
        gap: 10px;
        overflow: hidden;
      }

      .section h3 {
        margin: 0;
        font-size: 13px;
      }

      .section p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field {
        padding: 12px;
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        background: #fff;
        overflow: hidden;
      }

      .field label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 6px;
      }

      .field .value {
        font-size: 15px;
        font-weight: 900;
        line-height: 1.2;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .iframe-shell {
        min-height: 0;
        border-radius: 14px;
        border: 1px solid var(--border-soft);
        background: #fff;
        overflow: hidden;
      }

      .iframe-shell iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .action-btn {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .action-btn.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .work-list {
        display: grid;
        gap: 8px;
        overflow: hidden;
      }

      .work-item {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: #fff;
        overflow: hidden;
      }

      .work-item strong {
        font-size: 12px;
      }

      .work-item span {
        color: var(--muted);
        font-size: 12px;
      }

      .loading {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 1180px) {
        .grid,
        .workspace,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .app {
          height: auto;
          min-height: 100vh;
          overflow: auto;
        }

        html,
        body {
          overflow: auto;
        }
      }

      @media (max-width: 760px) {
        .app,
        .modal-shell {
          padding: 10px;
        }

        .hero,
        .modal-head {
          flex-direction: column;
          align-items: stretch;
        }

        .file-row,
        .work-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="shell">
        <header class="hero">
          <div>
            <p id="heroKicker" class="hero-kicker">MERGED MATERIALS</p>
            <h1 id="heroTitle" class="hero-title">머지된 실제 산출물 대시보드</h1>
            <p id="heroSubtitle" class="hero-subtitle">머지된 PR과 실제 생성 파일을 한눈에 보고, 카드 클릭 시 전체화면 작업 화면으로 이동합니다.</p>
          </div>
          <div id="heroChip" class="hero-chip">3건 머지 완료</div>
        </header>

        <section class="grid" id="dashboard" aria-label="머지된 산출물 목록">
          <div class="loading">머지된 산출물을 불러오는 중입니다.</div>
        </section>
      </div>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-shell">
        <button id="backBtn" class="back-btn" type="button" aria-label="뒤로 가기">←</button>
        <div id="modalContent" class="modal-content"></div>
      </div>
    </div>

      let dashboardData = DEFAULT_DATA;
      let activeIndex = null;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatDate(iso) {
        if (!iso) return "";
        const date = new Date(iso);
        return new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "short",
          day: "numeric"
        }).format(date);
      }

      function renderSummaryGrid(material) {
        return `
          <div class="summary-grid">
            <div class="summary">
              <div class="summary-label">구분</div>
              <div class="summary-value">${escapeHtml(material.kind)}</div>
            </div>
            <div class="summary">
              <div class="summary-label">상태</div>
              <div class="summary-value">${escapeHtml(material.status)}</div>
            </div>
            <div class="summary">
              <div class="summary-label">대표 파일</div>
              <div class="summary-value">${escapeHtml(material.primaryFile)}</div>
            </div>
            <div class="summary">
              <div class="summary-label">머지 일자</div>
              <div class="summary-value">${escapeHtml(formatDate(material.mergedAt))}</div>
            </div>
          </div>`;
      }

      function renderCard(material, index) {
        const summary = material.summary.map((line) => `<li>${escapeHtml(line)}</li>`).join("");
        const files = material.files.slice(0, 4).map((file, fileIndex) => `
          <div class="file-row">
            <div class="file-id">파일 ${fileIndex + 1}</div>
            <div class="file-title">${escapeHtml(file)}</div>
            <div class="file-state">반영</div>
          </div>
        `).join("");

        return `
          <article class="card" data-index="${index}" tabindex="0" role="button" aria-label="${escapeHtml(material.artifactTitle)} 열기">
            <div class="card-head">
              <div>
                <p class="card-kicker">PR #${material.number}${material.author ? ` · ${escapeHtml(material.author)}` : ""} · ${escapeHtml(material.prTitle)}</p>
                <h2 class="card-title">${escapeHtml(material.artifactTitle)}</h2>
                <p class="card-subtitle">${escapeHtml(material.primaryFile)}</p>
              </div>
              <div class="pill">${escapeHtml(material.badge)}</div>
            </div>

            ${renderSummaryGrid(material)}

            <div class="content">
              <div class="list-card">
                <h3>머지 요약</h3>
                <ul>${summary}</ul>
              </div>
              <div class="list-card">
                <h3>핵심 파일</h3>
                <div style="display:grid; gap:8px;">${files}</div>
              </div>
            </div>

            <div class="status-row">
              <span class="status done">${escapeHtml(material.status)}</span>
              <span class="status review">${escapeHtml(formatDate(material.mergedAt))}</span>
            </div>
          </article>`;
      }

      function renderOverviewCard() {
        const titles = dashboardData.materials.map((material) => `<li>PR #${material.number} · ${escapeHtml(material.artifactTitle)}</li>`).join("");
        return `
          <article class="card overview" data-overview="true" tabindex="0" role="button" aria-label="전체 머지 개요 열기">
            <div class="card-head">
              <div>
                <p class="card-kicker">전체 머지 개요</p>
                <h2 class="card-title">3개 머지 산출물 전체 반영</h2>
                <p class="card-subtitle">이 카드에서는 머지된 결과를 묶어서 빠르게 확인할 수 있습니다.</p>
              </div>
              <div class="pill">${dashboardData.materials.length}건</div>
            </div>

            <div class="content">
              <div class="list-card">
                <h3>머지된 목록</h3>
                <ul class="overview-list">${titles}</ul>
              </div>
              <div class="list-card">
                <h3>상태 표시</h3>
                <div class="status-row">
                  <span class="status done">모두 머지 완료</span>
                  <span class="status review">실제 파일 반영</span>
                  <span class="status review">모달 전체화면 지원</span>
                </div>
              </div>
            </div>

            <div class="status-row">
              <span class="status done">요약</span>
              <span class="status review">대시보드</span>
            </div>
          </article>`;
      }

      function renderDashboard() {
        document.getElementById("heroKicker").textContent = dashboardData.hero.kicker;
        document.getElementById("heroTitle").textContent = dashboardData.hero.title;
        document.getElementById("heroSubtitle").textContent = dashboardData.hero.subtitle;
        document.getElementById("heroChip").textContent = `${dashboardData.hero.mergedCount}건 머지 완료`;

        document.getElementById("dashboard").innerHTML = [
          ...dashboardData.materials.map((material, index) => renderCard(material, index)),
          renderOverviewCard()
        ].join("");
        bindCardEvents(document.getElementById("dashboard"));
      }

      function renderModal(material) {
        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");

        const actionLinks = (material.actions || [])
          .map((action) => `<a class="link-btn" href="${escapeHtml(action.href)}" target="_blank" rel="noreferrer">${escapeHtml(action.label)}</a>`)
          .join("");

        const fileList = material.files
          .map((file, index) => `
            <div class="work-item">
              <strong>파일 ${index + 1}</strong>
              <span>${escapeHtml(file)}</span>
              <span class="file-state">반영</span>
            </div>
          `)
          .join("");

        const summaryList = material.summary.map((line) => `<li>${escapeHtml(line)}</li>`).join("");

        const previewMarkup = material.previewPath
          ? `
            <div class="iframe-shell">
              <iframe src="${escapeHtml(material.previewPath)}" title="${escapeHtml(material.artifactTitle)}"></iframe>
            </div>`
          : `
            <div class="workspace">
              <div class="workspace-main">
                <section class="section">
                  <h3>업무 정보</h3>
                  <div class="detail-grid">
                    <div class="field">
                      <label>이슈/산출물</label>
                      <div class="value">${escapeHtml(material.artifactTitle)}</div>
                    </div>
                    <div class="field">
                      <label>원본 PR</label>
                      <div class="value">#${material.number}</div>
                    </div>
                    <div class="field">
                      <label>대표 파일</label>
                      <div class="value">${escapeHtml(material.primaryFile)}</div>
                    </div>
                    <div class="field">
                      <label>머지 일자</label>
                      <div class="value">${escapeHtml(formatDate(material.mergedAt))}</div>
                    </div>
                  </div>
                </section>

                <section class="section">
                  <h3>핵심 변경 요약</h3>
                  <div class="work-list">
                    ${material.summary.map((line, index) => `
                      <div class="work-item">
                        <strong>요약 ${index + 1}</strong>
                        <span>${escapeHtml(line)}</span>
                        <span class="file-state">반영</span>
                      </div>
                    `).join("")}
                  </div>
                </section>
              </div>

              <div class="workspace-side">
                <section class="section">
                  <h3>즉시 작업</h3>
                  <div class="action-row">
                    ${actionLinks}
                  </div>
                </section>

                <section class="section">
                  <h3>머지 상태</h3>
                  <div class="status-row">
                    <span class="status done">머지 완료</span>
                    <span class="status review">${escapeHtml(material.badge)}</span>
                  </div>
                </section>

                <section class="section">
                  <h3>파일 목록</h3>
                  <div class="work-list">${fileList}</div>
                </section>
              </div>
            </div>`;

        modalContent.innerHTML = `
          <section class="modal-panel">
            <div class="modal-head">
              <div>
                <p class="modal-kicker">PR #${material.number}${material.author ? ` · ${escapeHtml(material.author)}` : ""} · ${escapeHtml(material.prTitle)}</p>
                <h2 class="modal-title">${escapeHtml(material.artifactTitle)}</h2>
                <p class="modal-subtitle">${escapeHtml(material.primaryFile)}</p>
              </div>
              <a class="link-btn" href="${escapeHtml(material.prUrl)}" target="_blank" rel="noreferrer">원본 PR 열기</a>
            </div>
            ${previewMarkup}
          </section>
        `;

        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
      }

      function renderOverviewModal() {
        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");
        const mergedList = dashboardData.materials.map((material) => `
          <div class="work-item">
            <strong>PR #${material.number}</strong>
            <span>${escapeHtml(material.artifactTitle)}</span>
            <span class="file-state">${escapeHtml(formatDate(material.mergedAt))}</span>
          </div>
        `).join("");

        modalContent.innerHTML = `
          <section class="modal-panel">
            <div class="modal-head">
              <div>
                <p class="modal-kicker">전체 머지 개요</p>
                <h2 class="modal-title">머지된 실제 산출물 3건</h2>
                <p class="modal-subtitle">이 대시보드는 이슈 문구가 아니라 머지된 실제 파일과 앱을 기준으로 보여줍니다.</p>
              </div>
            </div>
            <div class="workspace">
              <div class="workspace-main">
                <section class="section">
                  <h3>머지 목록</h3>
                  <div class="work-list">${mergedList}</div>
                </section>
                <section class="section">
                  <h3>반영 기준</h3>
                  <p>각 카드의 제목은 실제 산출물 이름을 보여주고, 부제는 원본 PR 제목을 함께 보여줍니다. 제목이 바뀌면 PR 제목도 그대로 따라가며, 파일 목록은 머지된 변경 파일을 기준으로 갱신됩니다.</p>
                </section>
              </div>
              <div class="workspace-side">
                <section class="section">
                  <h3>상태 표시</h3>
                  <div class="status-row">
                    <span class="status done">모두 반영</span>
                    <span class="status review">자동 동기화 대상</span>
                    <span class="status review">GitHub 공개 검토 가능</span>
                  </div>
                </section>
                <section class="section">
                  <h3>다음 확인 지점</h3>
                  <div class="action-row">
                    <a class="link-btn" href="https://github.com/doduhyeong-cpu/PCD-5" target="_blank" rel="noreferrer">저장소 열기</a>
                  </div>
                </section>
              </div>
            </div>
          </section>
        `;

        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
      }

      function openCard(index) {
        const material = dashboardData.materials[index];
        if (!material) return;
        activeIndex = index;
        renderModal(material);
      }

      function openOverview() {
        activeIndex = "overview";
        renderOverviewModal();
      }

      function closeModal() {
        const modal = document.getElementById("modal");
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        document.getElementById("modalContent").innerHTML = "";
        activeIndex = null;
      }

      function bindCardEvents(root) {
        root.querySelectorAll("[data-index]").forEach((card) => {
          const index = Number(card.dataset.index);
          card.addEventListener("click", (event) => {
            if (event.target.closest("a, button")) return;
            openCard(index);
          });
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openCard(index);
            }
          });
        });

        root.querySelectorAll("[data-overview]").forEach((card) => {
          card.addEventListener("click", (event) => {
            if (event.target.closest("a, button")) return;
            openOverview();
          });
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openOverview();
            }
          });
        });
      }

      async function loadData() {
        try {
          const response = await fetch("./data/issues.json", { cache: "no-store" });
          if (!response.ok) throw new Error("Failed to load merged materials");
          return await response.json();
        } catch (error) {
          return DEFAULT_DATA;
        }
      }

      document.getElementById("backBtn").addEventListener("click", closeModal);
      document.getElementById("modal").addEventListener("click", (event) => {
        if (event.target.id === "modal") closeModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && activeIndex !== null) {
          closeModal();
        }
      });

      (async function bootstrap() {
        dashboardData = await loadData();
        renderDashboard();
      })();
    </script>
  </body>
</html>
