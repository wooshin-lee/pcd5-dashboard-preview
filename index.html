<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우신공업 부서별 업무 대시보드</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f8;
        --surface: rgba(255, 255, 255, 0.92);
        --surface-strong: #ffffff;
        --border: #d7e0ec;
        --border-soft: #e8eef5;
        --text: #10253a;
        --muted: #5d6f84;
        --accent: #1f6feb;
        --accent-soft: #eaf2ff;
        --success: #1f8a5b;
        --warning: #b87900;
        --danger: #bb3e3e;
        --shadow: 0 18px 44px rgba(16, 37, 58, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        font-family: "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(31, 111, 235, 0.11), transparent 28%),
          radial-gradient(circle at bottom right, rgba(31, 138, 91, 0.08), transparent 30%),
          linear-gradient(180deg, #f8fbfe 0%, var(--bg) 100%);
      }

      .app {
        width: 100vw;
        min-height: 100vh;
        padding: 16px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }

      .hero {
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .issue-label {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .grid {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 14px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .panel-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .panel-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .pill {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .content {
        min-height: 0;
        display: grid;
        gap: 12px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .summary {
        padding: 14px;
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        background: var(--surface-strong);
      }

      .summary-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
      }

      .summary-value {
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
      }

      .summary-foot {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .items {
        display: grid;
        gap: 10px;
      }

      .item {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: var(--surface-strong);
      }

      .item-id {
        font-weight: 800;
        color: var(--text);
      }

      .item-title {
        color: var(--text);
        line-height: 1.35;
      }

      .item-state {
        font-size: 12px;
        font-weight: 800;
        color: var(--success);
      }

      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .mini-card {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: var(--surface-strong);
      }

      .mini-card h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .mini-card ul {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .status {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      .status.done {
        color: var(--success);
        border-color: rgba(31, 138, 91, 0.2);
        background: rgba(31, 138, 91, 0.06);
      }

      .status.review {
        color: var(--warning);
        border-color: rgba(184, 121, 0, 0.2);
        background: rgba(184, 121, 0, 0.06);
      }

      .status.wait {
        color: var(--danger);
        border-color: rgba(187, 62, 62, 0.2);
        background: rgba(187, 62, 62, 0.06);
      }

      .loading {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 1180px) {
        .grid,
        .summary-grid,
        .card-grid {
          grid-template-columns: 1fr;
        }

        .app {
          min-height: 100vh;
          height: auto;
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 12px;
        }

        .item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div id="heroLabel" class="issue-label">ISSUE #7 · 우신공업 부서별 업무 대시보드</div>
      </header>

      <section class="grid" id="dashboard">
        <div class="loading">이슈 데이터를 불러오는 중입니다.</div>
      </section>
    </main>

    <script>
      const DEFAULT_DATA = {
        hero: { number: 7, title: "우신공업 부서별 업무 대시보드" },
        issues: [
          {
            number: 4,
            title: "공장정보 대시보드 필터·상세조회·통합 검증",
            badge: "검증",
            status: "완료",
            summary: [
              { label: "화면", value: "필터 + 상세" },
              { label: "핵심", value: "통합 검증" },
              { label: "연결", value: "조회 흐름" }
            ],
            notes: [
              "필터 조건으로 구현된 화면을 요약",
              "상세 조회와 검증 흐름을 한 패널에서 확인",
              "머지 후 점검 포인트를 정리"
            ]
          },
          {
            number: 3,
            title: "공장정보 대시보드 핵심 지표와 차트 영역 구현",
            badge: "지표",
            status: "완료",
            summary: [
              { label: "화면", value: "KPI + 차트" },
              { label: "핵심", value: "지표 영역" },
              { label: "연결", value: "시각화" }
            ],
            notes: [
              "핵심 지표와 차트 영역이 구현된 화면",
              "운영자가 빠르게 읽는 요약 영역",
              "대시보드의 중심 정보만 선별해 표시"
            ]
          },
          {
            number: 2,
            title: "관세업무 구매확인서 데이터 구현",
            badge: "데이터",
            status: "검토",
            summary: [
              { label: "화면", value: "구매확인서" },
              { label: "핵심", value: "데이터 구성" },
              { label: "연결", value: "업무 흐름" }
            ],
            notes: [
              "구매확인서 데이터가 반영되는 화면",
              "업무 데이터 구조를 확인하는 구역",
              "입력과 조회를 함께 보도록 구성"
            ]
          },
          {
            number: 1,
            title: "공장정보 대시보드 요약BOM 조회",
            badge: "조회",
            status: "대기",
            summary: [
              { label: "화면", value: "BOM 요약" },
              { label: "핵심", value: "조회 구조" },
              { label: "연결", value: "요약 표시" }
            ],
            notes: [
              "요약 BOM을 빠르게 조회하는 화면",
              "구성 항목을 한 눈에 보는 레이아웃",
              "머지 후 확인할 결과 중심으로 정리"
            ]
          }
        ]
      };

      function renderCard(issue) {
        const summary = issue.summary
          .map(
            (item) => `
              <div class="summary">
                <div class="summary-label">${item.label}</div>
                <div class="summary-value">${item.value}</div>
              </div>`
          )
          .join("");

        const notes = issue.notes.map((note) => `<li>${note}</li>`).join("");

        return `
          <article class="panel">
            <div class="panel-head">
              <div>
                <h2 class="panel-title">#${issue.number} · ${issue.title}</h2>
                <p class="panel-subtitle">머지된 구현 화면을 운영 관점에서 바로 읽을 수 있게 정리한 요약 카드입니다.</p>
              </div>
              <div class="pill">${issue.badge}</div>
            </div>

            <div class="content">
              <div class="summary-grid">${summary}</div>
              <div class="items">
                <div class="item">
                  <div class="item-id">구현</div>
                  <div class="item-title">${issue.title}</div>
                  <div class="item-state">${issue.status}</div>
                </div>
              </div>
            </div>

            <div class="card-grid">
              <div class="mini-card">
                <h3>화면 요약</h3>
                <ul>${notes}</ul>
              </div>
              <div class="mini-card">
                <h3>상태 표기</h3>
                <div class="status-row">
                  <span class="status done">완료</span>
                  <span class="status review">검토</span>
                  <span class="status wait">대기</span>
                </div>
              </div>
            </div>
          </article>`;
      }

      async function loadData() {
        try {
          const response = await fetch("./data/issues.json", { cache: "no-store" });
          if (!response.ok) throw new Error("Failed to load issues.json");
          return await response.json();
        } catch (error) {
          return DEFAULT_DATA;
        }
      }

      async function bootstrap() {
        const data = await loadData();
        document.getElementById("heroLabel").textContent =
          `ISSUE #${data.hero.number} · ${data.hero.title}`;
        document.getElementById("dashboard").innerHTML = data.issues
          .map(renderCard)
          .join("");
      }

      bootstrap();
    </script>
  </body>
</html>
