name: Sync dashboard issues

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh issue data
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const token = process.env.SOURCE_TOKEN;
          if (!token) {
            throw new Error('SOURCE_TOKEN secret is missing');
          }

          async function main() {
            const response = await fetch('https://api.github.com/repos/doduhyeong-cpu/PCD-5/issues?state=all&per_page=100', {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2026-03-10'
              }
            });

            if (!response.ok) {
              throw new Error(`GitHub API failed: ${response.status} ${response.statusText}`);
            }

            const issues = await response.json();
            const ordered = issues
              .filter((issue) => !issue.pull_request && issue.number !== 7)
              .sort((a, b) => a.number - b.number)
              .slice(0, 4)
              .map((issue, index) => {
                const defaults = [
                  {
                    badge: '검증',
                    status: '완료',
                    summary: [
                      { label: '화면', value: '필터 + 상세' },
                      { label: '핵심', value: '통합 검증' },
                      { label: '연결', value: '조회 흐름' }
                    ],
                    notes: [
                      '필터 조건으로 구현된 화면을 요약',
                      '상세 조회와 검증 흐름을 한 패널에서 확인',
                      '머지 후 점검 포인트를 정리'
                    ]
                  },
                  {
                    badge: '지표',
                    status: '완료',
                    summary: [
                      { label: '화면', value: 'KPI + 차트' },
                      { label: '핵심', value: '지표 영역' },
                      { label: '연결', value: '시각화' }
                    ],
                    notes: [
                      '핵심 지표와 차트 영역이 구현된 화면',
                      '운영자가 빠르게 읽는 요약 영역',
                      '대시보드의 중심 정보만 선별해 표시'
                    ]
                  },
                  {
                    badge: '데이터',
                    status: '검토',
                    summary: [
                      { label: '화면', value: '구매확인서' },
                      { label: '핵심', value: '데이터 구성' },
                      { label: '연결', value: '업무 흐름' }
                    ],
                    notes: [
                      '구매확인서 데이터가 반영되는 화면',
                      '업무 데이터 구조를 확인하는 구역',
                      '입력과 조회를 함께 보도록 구성'
                    ]
                  },
                  {
                    badge: '조회',
                    status: '대기',
                    summary: [
                      { label: '화면', value: 'BOM 요약' },
                      { label: '핵심', value: '조회 구조' },
                      { label: '연결', value: '요약 표시' }
                    ],
                    notes: [
                      '요약 BOM을 빠르게 조회하는 화면',
                      '구성 항목을 한 눈에 보는 레이아웃',
                      '머지 후 확인할 결과 중심으로 정리'
                    ]
                  }
                ][index];

                return {
                  number: issue.number,
                  title: issue.title,
                  ...defaults
                };
              });

            const payload = {
              hero: { number: 7, title: '우신공업 부서별 업무 대시보드' },
              issues: ordered
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/issues.json', JSON.stringify(payload, null, 2) + '\n');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit changes
        env:
          PUSH_TOKEN: ${{ secrets.SOURCE_TOKEN }}
        run: |
          if git diff --quiet -- data/issues.json; then
            echo "No issue data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/issues.json
          git commit -m "Sync dashboard issue data"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/wooshin-lee/pcd5-dashboard-preview.git"
          git push origin HEAD:master
