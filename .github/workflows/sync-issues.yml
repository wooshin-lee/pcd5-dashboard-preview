name: Sync merged materials

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh merged material data
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const token = process.env.SOURCE_TOKEN;
          if (!token) {
            throw new Error('SOURCE_TOKEN secret is missing');
          }

          const API_BASE = 'https://api.github.com/repos/doduhyeong-cpu/PCD-5';
          const HEADERS = {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          };

          async function loadJson(url) {
            const response = await fetch(url, { headers: HEADERS });
            if (!response.ok) {
              throw new Error(`GitHub API failed: ${response.status} ${response.statusText} for ${url}`);
            }
            return response.json();
          }

          async function loadPullFiles(number) {
            const files = await loadJson(`${API_BASE}/pulls/${number}/files?per_page=100`);
            return files.map((file) => file.path);
          }

          function detectKind(paths) {
            if (paths.includes('1. 구매확인서/purchase_confirmation_automation.html')) {
              return 'html-automation';
            }
            if (paths.some((path) => path.includes('python_gui/'))) {
              return 'python-gui';
            }
            if (paths.some((path) => path.startsWith('src/'))) {
              return 'electron-dashboard';
            }
            return 'generic';
          }

          function buildArtifact(pr, paths) {
            const kind = detectKind(paths);
            const base = {
              number: pr.number,
              author: pr.user.login,
              prTitle: pr.title,
              kind,
              status: '머지 완료',
              mergedAt: pr.merged_at,
              prUrl: pr.html_url,
              files: paths,
            };

            if (kind === 'html-automation') {
              return {
                ...base,
                artifactTitle: '구매확인서 CDP 자동화',
                badge: 'HTML',
                primaryFile: '1. 구매확인서/purchase_confirmation_automation.html',
                previewPath: 'assets/previews/purchase_confirmation_automation.html',
                summary: [
                  '구매확인서 HTML/GUI 자동화 화면',
                  '공통 엑셀 생성과 시트 분리',
                  '실제 다크 테마 작업 화면 미리보기',
                ],
                actions: [
                  { label: '실제 HTML 열기', href: 'assets/previews/purchase_confirmation_automation.html' },
                  { label: '원본 PR 보기', href: pr.html_url },
                ],
              };
            }

            if (kind === 'python-gui') {
              return {
                ...base,
                artifactTitle: '구매확인서 엑셀 편집기',
                badge: 'PY',
                primaryFile: '1. 구매확인서/python_gui/app.py',
                previewPath: 'assets/previews/purchase_workbook_editor_preview.html',
                summary: [
                  '엑셀 파일을 불러와 1페이지와 2페이지 데이터를 편집',
                  '선택한 통합본을 복사 저장하고 다시 읽기',
                  'HTML 편집기와 PySide6 GUI가 함께 제공',
                ],
                actions: [
                  { label: '엑셀 편집기 보기', href: 'assets/previews/purchase_workbook_editor_preview.html' },
                  { label: '원본 PR 보기', href: pr.html_url },
                ],
              };
            }

            if (kind === 'electron-dashboard') {
              return {
                ...base,
                artifactTitle: '공장정보 대시보드 필터·상세조회·통합 검증',
                badge: 'APP',
                primaryFile: 'src/renderer/dashboard.ts',
                previewPath: 'assets/previews/factory_dashboard_preview.html',
                summary: [
                  '필터/상세조회 중심의 공장정보 대시보드',
                  '결품 메일 자동화와 이력 관리',
                  '한글 입력 조합 문제 수정',
                ],
                actions: [
                  { label: '원본 PR 보기', href: pr.html_url },
                ],
              };
            }

            return {
              ...base,
              artifactTitle: pr.title,
              badge: 'MERGED',
              primaryFile: paths[0] || 'unknown',
              summary: ['머지된 산출물'],
              actions: [{ label: '원본 PR 보기', href: pr.html_url }],
            };
          }

          function orderArtifacts(items) {
            const kindOrder = {
              'html-automation': 0,
              'python-gui': 1,
              'electron-dashboard': 2,
              generic: 3
            };

            return items.sort((a, b) => {
              const byKind = (kindOrder[a.kind] ?? 99) - (kindOrder[b.kind] ?? 99);
              if (byKind !== 0) return byKind;
              return a.number - b.number;
            });
          }

          async function main() {
            const pulls = await loadJson(`${API_BASE}/pulls?state=closed&per_page=100`);
            const mergedPulls = pulls.filter((pull) => pull.merged_at);

            const artifacts = [];
            for (const pull of mergedPulls) {
              const paths = await loadPullFiles(pull.number);
              artifacts.push(buildArtifact(pull, paths));
            }

            const ordered = orderArtifacts(artifacts);
            const payload = {
              hero: {
                kicker: 'MERGED MATERIALS',
                title: '머지된 실제 산출물 대시보드',
                subtitle: '머지된 PR과 실제 생성 파일을 한눈에 보고, 카드 클릭 시 전체화면 작업 화면으로 이동합니다.',
                mergedCount: ordered.length
              },
              materials: ordered
            };

            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/issues.json', JSON.stringify(payload, null, 2) + '\n');
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit changes
        env:
          PUSH_TOKEN: ${{ secrets.SOURCE_TOKEN }}
        run: |
          if git diff --quiet -- data/issues.json; then
            echo "No merged material data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/issues.json
          git commit -m "Sync merged materials data"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/wooshin-lee/pcd5-dashboard-preview.git"
          git push origin HEAD:master
