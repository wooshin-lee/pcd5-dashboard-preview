<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERP 당일 결품 판정 EXE 앱</title>
    <style>
      :root {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
        color: #132018;
        background: #eef1ec;
        --bg: #eef1ec;
        --surface: rgba(255, 255, 255, 0.92);
        --line: #d7ddd4;
        --line-strong: #c4cec1;
        --ink: #132018;
        --muted: #5d6d61;
        --accent: #1d6b50;
        --accent-soft: #e6f2ed;
        --accent-strong: #124837;
        --warn: #b97a11;
        --warn-soft: #fff3d8;
        --danger: #b0442f;
        --danger-soft: #fde8e1;
        --ok: #3f7b44;
        --ok-soft: #e8f4e6;
        --info: #285f9f;
        --info-soft: #e8f1fd;
        --shadow: 0 18px 40px rgba(15, 31, 20, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 214, 153, 0.38), transparent 23rem),
          radial-gradient(circle at top right, rgba(159, 215, 193, 0.28), transparent 22rem),
          linear-gradient(180deg, #f3f6f2 0%, #e8ede6 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        max-width: 1480px;
        margin: 0 auto;
        padding: 28px 18px 42px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
        padding: 22px 24px;
        margin-bottom: 16px;
        border: 1px solid rgba(29, 107, 80, 0.15);
        border-radius: 22px;
        background:
          linear-gradient(135deg, rgba(29, 107, 80, 0.1), rgba(255, 255, 255, 0.9)),
          var(--surface);
        box-shadow: var(--shadow);
        flex-wrap: wrap;
      }

      .title-block {
        display: grid;
        gap: 6px;
        min-width: min(100%, 420px);
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .title-block strong {
        font-size: 28px;
        line-height: 1.1;
      }

      .title-block span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
        min-width: min(100%, 420px);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border-radius: 12px;
        padding: 0 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn.primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #ffffff;
        border-color: var(--accent);
      }

      .status-banner {
        margin-bottom: 16px;
        padding: 13px 16px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 14px;
        font-weight: 700;
      }

      .view-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .layout {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        min-height: 760px;
        border: 1px solid rgba(19, 32, 24, 0.08);
        border-radius: 24px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .sidebar {
        padding: 18px;
        border-right: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(248, 250, 247, 0.96), rgba(241, 245, 239, 0.98));
      }

      .main {
        display: grid;
        gap: 16px;
        padding: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(249, 251, 248, 0.94));
      }

      .section-title {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .status-card,
      .filter-card,
      .item,
      .summary-card,
      .section-card,
      .table-box,
      .detail-box,
      .mail-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.92);
      }

      .status-card,
      .filter-card {
        padding: 14px;
        margin-bottom: 14px;
      }

      .status-card.compact {
        margin-bottom: 0;
      }

      .metric {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 10px 0;
        border-top: 1px solid #e7ece5;
        font-size: 14px;
      }

      .metric:first-of-type {
        border-top: 0;
      }

      .metric span:first-child {
        color: var(--muted);
      }

      .metric strong {
        text-align: right;
      }

      .pill-row,
      .inline-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill.ok {
        background: var(--ok-soft);
        color: var(--ok);
      }

      .pill.info {
        background: var(--info-soft);
        color: var(--info);
      }

      .pill.warn {
        background: var(--warn-soft);
        color: var(--warn);
      }

      .pill.danger {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .pill.muted {
        background: #edf1ec;
        color: #627367;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .item {
        padding: 12px;
        text-align: left;
      }

      .item.selectable {
        cursor: pointer;
      }

      .item.active {
        border-color: rgba(29, 107, 80, 0.35);
        background: rgba(230, 242, 237, 0.9);
      }

      .item-head,
      .table-toolbar,
      .card-header,
      .subsection-head,
      .reply-actions {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        flex-wrap: wrap;
      }

      .item strong,
      .card-header h3,
      .table-toolbar h3,
      .detail-pane h3,
      .reply-editor h4 {
        margin: 0;
        font-size: 18px;
      }

      .card-header h3,
      .table-toolbar h3,
      .detail-pane h3,
      .reply-editor h4 {
        margin-bottom: 6px;
      }

      .item p,
      .card-header p,
      .table-toolbar p,
      .mini-copy,
      .empty-panel p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .summary-card {
        min-height: 120px;
        padding: 14px;
      }

      .summary-card small {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .summary-card strong {
        display: block;
        font-size: 28px;
        line-height: 1;
      }

      .summary-card p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .summary-card.danger strong {
        color: var(--danger);
      }

      .summary-card.warn strong {
        color: var(--warn);
      }

      .section-card {
        padding: 18px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: minmax(240px, 1.6fr) minmax(180px, 0.8fr) minmax(180px, 0.8fr);
        gap: 12px;
        margin-bottom: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .field span {
        font-weight: 700;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 11px 12px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
      }

      .field.checkbox {
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 10px;
        padding-top: 25px;
      }

      .field.checkbox input {
        width: 18px;
        height: 18px;
        margin: 0;
      }

      .field textarea {
        min-height: 120px;
        resize: vertical;
      }

      .textarea-field {
        margin-top: 6px;
      }

      .hint {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .table-box {
        overflow: hidden;
      }

      .table-toolbar {
        padding: 16px 16px 0;
      }

      .table-wrap {
        overflow: auto;
        padding: 12px 0 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid #e8ece6;
        text-align: left;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #f4f7f3;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      tr.alert {
        background: rgba(253, 232, 225, 0.58);
      }

      tr.changed {
        box-shadow: inset 4px 0 0 #c18a24;
      }

      tr.selected {
        outline: 2px solid rgba(29, 107, 80, 0.55);
        outline-offset: -2px;
      }

      tbody tr[data-row-index],
      tbody tr[data-history-index] {
        cursor: pointer;
      }

      .danger-text {
        color: var(--danger);
        font-weight: 700;
      }

      .ok-text {
        color: var(--ok);
        font-weight: 700;
      }

      .empty-row {
        color: var(--muted);
      }

      .detail-box {
        padding: 18px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
      }

      .detail-pane {
        padding: 18px;
      }

      .detail-pane.secondary {
        border-left: 1px solid var(--line);
        background: rgba(245, 247, 243, 0.76);
      }

      .subdued {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .compact-info {
        margin-top: 0;
      }

      .info-pair {
        display: grid;
        gap: 4px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #e5ebe3;
        background: rgba(255, 255, 255, 0.78);
      }

      .info-pair span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .info-pair strong {
        font-size: 14px;
        word-break: break-word;
      }

      .formula,
      .note-box,
      .mail-preview,
      .mail-card {
        margin-top: 12px;
      }

      .formula {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(29, 107, 80, 0.16);
        background: rgba(230, 242, 237, 0.68);
        font-weight: 700;
        line-height: 1.55;
      }

      .note-box {
        padding: 14px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid #e7ece5;
      }

      .note-box strong {
        display: block;
        margin-bottom: 8px;
      }

      .mail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .mail-card {
        padding: 14px;
      }

      .mail-card.sent {
        background: rgba(232, 244, 230, 0.85);
      }

      .mail-card.dry-run,
      .mail-card.duplicate {
        background: rgba(232, 241, 253, 0.78);
      }

      .mail-card.failed,
      .mail-card.missing-email {
        background: rgba(253, 232, 225, 0.82);
      }

      .mail-card.skipped {
        background: rgba(255, 243, 216, 0.78);
      }

      .inline-status {
        font-weight: 700;
      }

      .inline-status.ok {
        color: var(--ok);
      }

      .inline-status.info {
        color: var(--info);
      }

      .inline-status.warn {
        color: var(--warn);
      }

      .inline-status.danger {
        color: var(--danger);
      }

      .inline-status.muted {
        color: var(--muted);
      }

      .mail-preview {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #e1e7df;
        background: rgba(255, 255, 255, 0.84);
        color: #435246;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .mail-preview.compact {
        max-height: 220px;
        overflow: auto;
      }

      .reply-editor {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid #dfe6dd;
      }

      .reply-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .empty-panel {
        padding: 26px;
      }

      .empty-panel strong {
        display: block;
        margin-bottom: 8px;
        font-size: 17px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(10, 18, 13, 0.54);
        backdrop-filter: blur(6px);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .modal-shell {
        width: min(1240px, 100%);
        max-height: calc(100vh - 48px);
        overflow: auto;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(248, 251, 247, 0.98);
        box-shadow: 0 26px 60px rgba(8, 18, 12, 0.28);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding: 20px 22px 14px;
        border-bottom: 1px solid var(--line);
      }

      .modal-header h2 {
        margin: 6px 0;
        font-size: 24px;
        line-height: 1.15;
      }

      .modal-header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .modal-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 14px 22px 0;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.95fr);
        gap: 16px;
        padding: 18px 22px 22px;
      }

      .modal-column {
        display: grid;
        gap: 14px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .action-checklist {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .action-chip {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(255, 243, 216, 0.9);
        color: var(--warn);
        font-size: 12px;
        font-weight: 700;
      }

      @media (max-width: 1320px) {
        .summary-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .mail-grid,
        .reply-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 1120px) {
        .layout,
        .detail-grid,
        .modal-grid,
        .stat-grid {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .detail-pane.secondary {
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }

      @media (max-width: 820px) {
        .shell {
          padding: 18px 12px 28px;
        }

        .topbar,
        .toolbar,
        .view-tabs,
        .item-head,
        .table-toolbar,
        .card-header,
        .subsection-head,
        .reply-actions {
          flex-direction: column;
          align-items: flex-start;
        }

        .summary-grid,
        .settings-grid,
        .info-grid,
        .reply-grid {
          grid-template-columns: 1fr;
        }

        .toolbar .btn,
        .view-tabs .btn {
          width: 100%;
        }
      }
    </style>
  </head>

        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

          case "partial": return "부분 확보";
          case "unavailable": return "입고 불가";
          default: return "미입력";
        }
      }

      function replyPillClass(status) {
        switch (status) {
          case "completed": return "ok";
          case "scheduled": return "info";
          case "partial": return "warn";
          case "unavailable": return "danger";
          default: return "muted";
        }
      }

      function mailStatusLabel(status) {
        switch (status) {
          case "missing-email": return "주소 미등록";
          case "dry-run": return "시뮬레이션";
          case "sent": return "실발송";
          case "failed": return "발송 실패";
          default: return "발송 전";
        }
      }

      function mailStatusClass(status) {
        switch (status) {
          case "missing-email": return "danger";
          case "dry-run": return "info";
          case "sent": return "ok";
          case "failed": return "danger";
          default: return "muted";
        }
      }

      function changeStatusLabel(status, row) {
        switch (status) {
          case "new-shortage": return "신규 결품";
          case "shortage-up": return `부족 증가 (${row.previousShortageQty || 0} -> ${row.shortageQty})`;
          case "shortage-down": return `부족 감소 (${row.previousShortageQty || 0} -> ${row.shortageQty})`;
          case "resolved": return "정상 전환";
          default: return "변동 없음";
        }
      }

      function changeStatusClass(status) {
        switch (status) {
          case "new-shortage":
          case "shortage-up":
            return "danger";
          case "shortage-down":
            return "ok";
          case "resolved":
            return "info";
          default:
            return "muted";
        }
      }

      function getFilteredRows() {
        const search = state.searchText.trim().toLowerCase();
        return shortageRows.filter((row) => {
          if (state.statusFilter === "shortage" && row.status !== "shortage") {
            return false;
          }
          if (state.statusFilter === "ok" && row.status !== "ok") {
            return false;
          }
          if (state.changeOnly && row.changeStatus === "unchanged") {
            return false;
          }
          if (!search) {
            return true;
          }
          return [row.itemCode, row.itemName, row.supplierName, row.supplierCode]
            .join(" ")
            .toLowerCase()
            .includes(search);
        });
      }

      function getSelectedRow() {
        const rows = getFilteredRows();

                    <tbody>
                      ${mailHistory.map((entry, index) => `
                        <tr class="${index === state.selectedHistoryIndex ? "selected" : ""}" data-history-index="${index}">
                          <td>${escapeHtml(entry.sentAt)}</td>
                          <td>${escapeHtml(entry.supplierName)}</td>
                          <td>${escapeHtml(entry.recipientEmail || "미등록")}</td>
                          <td>${escapeHtml(entry.subject)}</td>
                          <td><span class="pill ${replyPillClass(entry.replyStatus)}">${replyStatusLabel(entry.replyStatus)}</span></td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>
              </section>

              <section class="detail-box">
                <div class="detail-grid">
                  <div class="detail-pane">
                    <div class="subsection-head">
                      <h3>메일 이력 상세</h3>
                      <span class="subdued">${selected ? escapeHtml(selected.sentAt) : "-"}</span>
                    </div>
                    ${
                      !selected
                        ? `<div class="empty-panel"><strong>저장된 메일 이력이 없습니다.</strong><p>발송 이력이 쌓이면 여기에서 제목과 본문을 다시 확인할 수 있습니다.</p></div>`
                        : `
                          <div class="info-grid">
                            <div class="info-pair"><span>협력사</span><strong>${escapeHtml(selected.supplierName)}</strong></div>
                            <div class="info-pair"><span>협력사 코드</span><strong>${escapeHtml(selected.supplierCode)}</strong></div>
                            <div class="info-pair"><span>수신 주소</span><strong>${escapeHtml(selected.recipientEmail || "미등록")}</strong></div>
                            <div class="info-pair"><span>회신 상태</span><strong>${replyStatusLabel(selected.replyStatus)}</strong></div>
                          </div>
                          <div class="formula"><strong>메일 제목</strong><br />${escapeHtml(selected.subject)}</div>
                          <pre class="mail-preview">${escapeHtml(selected.body)}</pre>
                        `
                    }
                  </div>
                  <div class="detail-pane secondary">
                    <div class="reply-editor">
                      <h4>협력사 회신 입력</h4>
                      <div class="reply-grid">
                        <label class="field">
                          <span>회신 상태</span>
                          <select>
                            <option selected>미입력</option>
                            <option>입고 예정</option>
                            <option>부분 확보</option>
                            <option>입고 완료</option>
                            <option>입고 불가</option>
                          </select>
                        </label>
                        <label class="field">
                          <span>입고 예정 시각</span>
                          <input type="text" value="2026-06-18 10:00" />
                        </label>
                        <label class="field">
                          <span>확보 예정 수량</span>
                          <input type="number" value="0" />
                        </label>
                      </div>
                      <label class="field textarea-field">
                        <span>메모</span>
                        <textarea placeholder="전화 확인 내용, 지연 사유, 운송 상태 등을 기록"></textarea>
                      </label>
                      <div class="reply-actions">
                        <div class="inline-pills">
                          <span class="pill info">요청 마감 2026-06-18 10:00</span>
                          <span class="pill muted">현재 부족 458 EA</span>
                        </div>
                        <button type="button" class="btn primary">회신 내용 저장</button>
                      </div>
                    </div>
                  </div>
                </div>
              </section>
            </main>
          </section>
        `;
      }

      function buildModal() {
        const row = getSelectedRow();
        if (!row) {
          return "";
        }
        return `
          <div id="modal-backdrop" class="modal-backdrop ${state.modalOpen ? "open" : ""}">
            <section class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="modal-title">
              <div class="modal-header">
                <div>
                  <div class="eyebrow">SHORTAGE DETAIL</div>
                  <h2 id="modal-title">${escapeHtml(row.itemCode)} · ${escapeHtml(row.itemName)}</h2>
                  <p>${escapeHtml(row.supplierName)} · ${escapeHtml(row.dateKey)} · 결품</p>
                </div>
                <button id="close-modal" type="button" class="btn">닫기</button>
              </div>
              <div class="modal-toolbar">
                <span class="pill danger">결품</span>
                <span class="pill ${mailStatusClass(row.mailStatus)}">${mailStatusLabel(row.mailStatus)}</span>
                <span class="pill ${replyPillClass(row.replyStatus)}">${replyStatusLabel(row.replyStatus)}</span>
              </div>
              <div class="modal-grid">
                <div class="modal-column">
                  <div class="stat-grid">
                    <div class="info-pair"><span>협력사</span><strong>${escapeHtml(row.supplierName)}</strong></div>
                    <div class="info-pair"><span>협력사 코드</span><strong>${escapeHtml(row.supplierCode)}</strong></div>
                    <div class="info-pair"><span>전일 재고</span><strong>${formatNumber(row.carryStock)}</strong></div>
                    <div class="info-pair"><span>당일 수량</span><strong>${formatNumber(row.todayRequiredQty)}</strong></div>
                    <div class="info-pair"><span>부족 수량</span><strong>${formatNumber(row.shortageQty)} EA</strong></div>
                    <div class="info-pair"><span>요청 시각</span><strong>금일 10:00</strong></div>
                  </div>
                  <div class="formula">부족 수량 = max(${formatNumber(row.todayRequiredQty)} - ${formatNumber(row.carryStock)}, 0) = ${formatNumber(row.shortageQty)} EA</div>
                  <div class="note-box">
                    <strong>다음 조치 체크</strong>
                    <div class="action-checklist">
                      <span class="action-chip">협력사 회신 확인</span>
                      <span class="action-chip">10:00 이전 입고 가능 여부 재확인</span>
                      <span class="action-chip">회신 내용을 이력에 저장</span>
                    </div>
                  </div>
                </div>
                <div class="modal-column">
                  <div class="info-grid compact-info">
                    <div class="info-pair"><span>수신 주소</span><strong>${escapeHtml(row.recipientEmail || "미등록")}</strong></div>
                    <div class="info-pair"><span>메일 상태</span><strong>${mailStatusLabel(row.mailStatus)}</strong></div>
                    <div class="info-pair"><span>회신 상태</span><strong>${replyStatusLabel(row.replyStatus)}</strong></div>
                    <div class="info-pair"><span>남은 부족</span><strong>${formatNumber(row.shortageQty)} EA</strong></div>
                  </div>
                  <pre class="mail-preview">${escapeHtml(buildMailBody(row))}</pre>
                </div>
              </div>
            </section>
          </div>
        `;
      }

      function render() {
        const app = document.getElementById("app");
        app.innerHTML = `
          <main class="shell">
            ${buildTopbar()}
            ${buildBanner()}
            ${buildTabs()}
            ${state.activeView === "shortage"
              ? `
                <section class="layout">
                  ${buildShortageSidebar()}
                  <main class="main">
                    ${buildSummaryGrid()}
                    ${buildFilterSection()}
                    ${buildResultsTable()}
                    ${buildQuickDetail()}
                    ${buildMailStatusSection()}
                    ${buildSettingsSection()}
                  </main>
                </section>
              `
              : buildHistoryView()
            }
            ${state.activeView === "shortage" ? buildModal() : ""}
          </main>
        `;

        bindEvents();
      }

      function bindEvents() {
        const tabShortage = document.getElementById("tab-shortage");
        const tabHistory = document.getElementById("tab-history");
        const searchInput = document.getElementById("search-input");
        const statusFilter = document.getElementById("status-filter");
        const changeOnly = document.getElementById("change-only");
        const openModal = document.getElementById("open-modal");
        const closeModal = document.getElementById("close-modal");
        const modalBackdrop = document.getElementById("modal-backdrop");

        if (tabShortage) {
          tabShortage.addEventListener("click", () => {
            state.activeView = "shortage";
            render();
          });
        }

        if (tabHistory) {
          tabHistory.addEventListener("click", () => {
            state.activeView = "mail-history";
            state.modalOpen = false;
            render();
          });
        }

        if (searchInput) {
          searchInput.addEventListener("input", (event) => {
            state.searchText = event.target.value;
            state.selectedIndex = 0;
            render();
          });
        }

        if (statusFilter) {
          statusFilter.addEventListener("change", (event) => {
            state.statusFilter = event.target.value;
            state.selectedIndex = 0;
            render();
          });
        }

        if (changeOnly) {
          changeOnly.addEventListener("change", (event) => {
            state.changeOnly = event.target.checked;
            state.selectedIndex = 0;
            render();
          });
        }

        document.querySelectorAll("[data-row-index]").forEach((row) => {
          row.addEventListener("click", () => {
            state.selectedIndex = Number(row.dataset.rowIndex);
            render();
          });
        });

        document.querySelectorAll("[data-history-index]").forEach((row) => {
          row.addEventListener("click", () => {
            state.selectedHistoryIndex = Number(row.dataset.historyIndex);
            render();
          });
        });

        if (openModal) {
          openModal.addEventListener("click", () => {
            state.modalOpen = true;
            render();
          });
        }

        if (closeModal) {
          closeModal.addEventListener("click", () => {
            state.modalOpen = false;
            render();
          });
        }

        if (modalBackdrop) {
          modalBackdrop.addEventListener("click", (event) => {
            if (event.target === modalBackdrop) {
              state.modalOpen = false;
              render();
            }
          });
        }
      }

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.modalOpen) {
          state.modalOpen = false;
          render();
        }
      });

      render();
    </script>
  </body>
</html>
